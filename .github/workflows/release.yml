name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and package
        run: npm run package:win

      - name: Find packaged exe
        id: find_exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "dist/electron/Packaged" -Filter "*.exe" -Recurse | Select-Object -First 1
          echo "EXE_PATH=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          echo "EXE_NAME=$($exe.Name)" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_exe.outputs.EXE_PATH }}
          generate_release_notes: true
          draft: false
