# fly.toml app configuration file generated for dawn-thunder-3296 on 2026-04-26T16:11:45-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'dawn-thunder-3296'
primary_region = 'gru'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  # Keep one machine running 24/7 so the godmode worker's scheduled tick keeps firing
  # (a stopped machine runs no JS). Auto-start still spins extras up under load.
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

# Persistent storage for the godmode worker state (encrypted AMVGG cookie + config + log).
# Create once:  flyctl volumes create godmode_data --size 1 --region gru
[[mounts]]
  source = 'godmode_data'
  destination = '/data'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
